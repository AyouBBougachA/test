name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        run: mvn -f identity-service/pom.xml test

  frontend-check:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: grad_project-main/package-lock.json

      - name: Install frontend dependencies
        working-directory: grad_project-main
        run: npm ci

      - name: Lint frontend
        working-directory: grad_project-main
        run: npm run lint

      - name: Build frontend
        working-directory: grad_project-main
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8081
        run: npm run build
