name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cmms_db
          POSTGRES_USER: mohaimen
          POSTGRES_PASSWORD: mohaimen1234
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        run: mvn -f identity-service/pom.xml test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/cmms_db?stringtype=unspecified
          DB_USERNAME: mohaimen
          DB_PASSWORD: mohaimen1234

  frontend-check:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: grad_project-main/package-lock.json

      - name: Install frontend dependencies
        working-directory: grad_project-main
        run: npm ci

      - name: Lint frontend
        working-directory: grad_project-main
        run: npm run lint

      - name: Build frontend
        working-directory: grad_project-main
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8081
        run: npm run build
